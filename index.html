<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Tournament: Word Race</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Balsamiq+Sans:wght@400;700&family=Boogaloo&family=Bubblegum+Sans&family=Chewy&family=Comic+Neue:wght@400;700&family=Fredoka+One&family=Open+Sans:wght@400;700&family=Patrick+Hand&family=Quicksand:wght@400;700&family=Short+Stack&display=swap" rel="stylesheet">

    <style>
        /* --- Playful & Clean Color Palette & Global Variables --- */
        :root {
            --primary: #FF5722;     
            --secondary: #03A9F4;   
            --success: #8BC34A;     
            --danger: #FF5252;      
            --accent: #FFCA28;      
            --bg: #E1F5FE;          
            --text: #263238;        

            /* Dynamic Font Settings */
            --game-font: 'Balsamiq Sans', cursive;
            --game-base-size: 25px;
            --game-font-weight: 700;
        }

        body { 
            user-select: none; -webkit-user-select: none; touch-action: none; 
            margin: 0; overflow: hidden; 
            font-family: var(--game-font); font-size: var(--game-base-size); font-weight: var(--game-font-weight);
            background-color: var(--bg); color: var(--text);
            transition: font-family 0.3s, font-size 0.3s;
        }

        /* --- Dynamic Video/Image Background Engine --- */
        #dynamic-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
            background-color: var(--bg);
        }
        #dynamic-bg video, #dynamic-bg img {
            width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0;
        }

        .screen {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            padding: 2vw; text-align: center; height: 100vh; width: 100vw; box-sizing: border-box;
            position: absolute; top: 0; left: 0; 
            background: rgba(225, 245, 254, 0.6); 
        }
        .active { display: flex; }

        h1 { font-size: clamp(2.5rem, 6vw, 6rem); text-shadow: 3px 3px 0px white; margin: 10px 0; }
        h2 { font-size: clamp(1.8rem, 4vw, 4rem); text-shadow: 2px 2px 0px white; margin: 10px 0;}
        p { font-size: clamp(1.2rem, 2.5vw, 2.5rem); text-shadow: 1px 1px 0px white; }

        /* --- Rainbow Bouncing Title --- */
        .title-container {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .bouncing-letter {
            font-size: clamp(4rem, 10vw, 8rem);
            font-weight: bold;
            -webkit-text-stroke: 4px white; 
            text-shadow: 5px 5px 0px rgba(0,0,0,0.4); 
            animation: bounce 0.6s infinite alternate;
        }
        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-25px); }
        }

        .btn {
            background: linear-gradient(145deg, #4FC3F7, var(--secondary)); color: white; border: none;
            padding: clamp(10px, 2vw, 20px) clamp(20px, 4vw, 45px); font-size: clamp(1.2rem, 2.5vw, 1.8rem);
            border-radius: 60px; cursor: pointer; box-shadow: 0 8px 0 #0288D1, 0 15px 20px rgba(0,0,0,0.2);
            transition: all 0.1s ease; margin: 10px; font-family: inherit; font-weight: inherit; text-transform: uppercase;
        }
        .btn:active { transform: translateY(8px); box-shadow: 0 0px 0 #0288D1, 0 5px 10px rgba(0,0,0,0.2); }
        .btn-orange { background: linear-gradient(145deg, #FF8A65, var(--primary)); box-shadow: 0 8px 0 #E64A19, 0 15px 20px rgba(0,0,0,0.2); }
        .btn-green { background: linear-gradient(145deg, #AED581, var(--success)); box-shadow: 0 8px 0 #689F38, 0 15px 20px rgba(0,0,0,0.2); }
        .btn-danger { background: linear-gradient(145deg, #FF8A80, var(--danger)); box-shadow: 0 8px 0 #D32F2F, 0 15px 20px rgba(0,0,0,0.2); }
        .btn-disabled { background: #CFD8DC !important; box-shadow: 0 8px 0 #90A4AE !important; color: #78909C !important; cursor: not-allowed; transform: translateY(8px); }

        input.large-input {
            font-size: clamp(1.5rem, 3vw, 3rem); padding: 15px 20px; border-radius: 40px;
            border: 6px solid var(--secondary); text-align: center; width: 85%; max-width: 500px;
            margin-bottom: 30px; font-family: inherit; outline: none;
        }

        .lobby-container { width: 95%; max-width: 1000px; background: rgba(255,255,255,0.9); border-radius: 30px; padding: 15px; box-shadow: 0 20px 40px rgba(3, 169, 244, 0.15); border: 8px dashed #B3E5FC; margin-bottom: 20px; }
        .lobby-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; max-height: 45vh; overflow-y: auto; padding: 10px; }
        
        .name-card { 
            background: linear-gradient(145deg, #FFE082, var(--accent)); color: var(--text); padding: 8px 12px; border-radius: 12px; font-size: clamp(0.9rem, 1.5vw, 1.2rem); text-transform: capitalize; box-shadow: 0 4px 0px #F57F17; white-space: nowrap; 
            display: flex; justify-content: space-between; align-items: center; gap: 8px; transition: opacity 0.3s, background 0.3s, box-shadow 0.3s;
        }
        .name-card-text { overflow: hidden; text-overflow: ellipsis; flex-grow: 1; text-align: left; display: flex; align-items: center; gap: 6px; font-weight: bold;}
        
        /* Online Status Dots */
        .dot-online { color: var(--success); text-shadow: 0 0 4px var(--success); font-size: 1.2em; }
        .dot-offline { color: #9E9E9E; font-size: 1.2em; }

        .kick-btn {
            background: rgba(255, 82, 82, 0.9); color: white; border: none; border-radius: 50%; width: 22px; height: 22px; min-width: 22px; font-size: 12px; cursor: pointer; display: flex; justify-content: center; align-items: center; font-weight: bold; padding: 0; box-shadow: 0 2px 0px #D32F2F;
        }
        .kick-btn:active { transform: translateY(2px); box-shadow: none; }

        .bracket-container { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; align-items: center; overflow-y: auto; max-height: 60vh; padding: 15px; width: 100%; }
        .match-card { background: rgba(255,255,255,0.9); border: 5px solid #E1F5FE; border-radius: 20px; padding: 10px; width: clamp(140px, 22vw, 250px); }
        .match-active { border-color: var(--primary); transform: scale(1.05); }
        .p-slot { padding: 8px; margin: 5px 0; background: #F5F5F5; border-radius: 12px; color: #78909C; font-size: clamp(0.85rem, 1.5vw, 1.1rem); display: flex; justify-content: space-between; align-items: center;}
        .p-winner { background: linear-gradient(145deg, #AED581, var(--success)) !important; color: white; box-shadow: 0 4px 0 #689F38; }

        .game-header { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 5px; }
        #game-image-display { max-height: 15vh; border-radius: 15px; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        #word-slots { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 10px; }
        .slot {
            width: clamp(40px, 8vw, 70px); height: clamp(40px, 8vw, 70px);
            border: 4px dashed #B0BEC5; border-radius: 15px; background: rgba(255,255,255,0.9);
            display: flex; align-items: center; justify-content: center;
            font-size: clamp(2rem, 5vw, 3.5rem); color: black; text-transform: uppercase; cursor: pointer; transition: background 0.2s;
        }
        
        #letter-sea { 
            position: relative; width: 95vw; height: 42vh; background: rgba(255,255,255,0.5); 
            border: 6px solid rgba(255,255,255,0.8); border-radius: 30px; overflow: hidden; box-sizing: border-box; margin-bottom: 10px;
        }
        
        .bubble {
            position: absolute; display: flex; align-items: center; justify-content: center; 
            font-size: clamp(2rem, 5vw, 3.5rem); color: black; font-weight: bold; cursor: pointer; text-transform: uppercase; 
            background: radial-gradient(circle at 30% 30%, #FFFDE7, #FFF176); border-radius: 50%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); border: 2px solid #FBC02D;
        }

        #backspace-btn {
            background: var(--danger); color: white; border: none; padding: 10px 30px; font-size: 1.2rem;
            border-radius: 30px; cursor: pointer; box-shadow: 0 5px 0 #D32F2F; margin-bottom: 10px;
        }
        #backspace-btn:active { transform: translateY(5px); box-shadow: 0 0px 0 #D32F2F; }

        .top-btn { position: fixed; z-index: 1000; padding: 10px 20px; border-radius: 30px; font-size: 1.2rem; cursor: pointer; border: 3px solid white; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); font-family: inherit; }
        #leave-btn { top: 15px; left: 75px; right: auto; background: var(--danger); color: white; display: none; } 
        
        #home-btn { 
            position: fixed; top: 15px; left: 15px; font-size: 20px; cursor: pointer; 
            z-index: 1000; background: var(--secondary); border-radius: 50%; width: 45px; height: 45px; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); border: 3px solid white; color: white; padding: 0;
        }
        #gear { 
            position: fixed; top: 15px; right: 15px; font-size: 25px; cursor: pointer; 
            z-index: 1000; background: white; border-radius: 50%; width: 45px; height: 45px; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); border: 3px solid var(--secondary);
        }
        
        #top-student-name {
            display: none; position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            background: white; color: var(--primary); padding: 5px 25px; border-radius: 30px;
            font-size: 1.5rem; font-weight: bold; border: 4px solid var(--secondary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); z-index: 1000; text-transform: uppercase;
        }
        
        #status-indicator { position: fixed; bottom: 15px; left: 15px; width: 20px; height: 20px; border-radius: 50%; background: #9E9E9E; z-index: 1000; border: 3px solid white; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); z-index: 999; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 30px; z-index: 1001; width: 95%; max-width: 750px; max-height: 90vh; overflow-y: auto; color: #333; }
        .dash-section { background: #f9f9f9; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #ddd; text-align: left; }
        .dash-section label { display: block; font-weight: bold; color: var(--primary); margin-bottom: 5px; }
        .dash-input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; margin-bottom: 10px; font-size: 1rem; font-family: sans-serif;}
        .file-upload-btn { background: var(--secondary); color: white; padding: 8px 15px; border-radius: 8px; cursor: pointer; display: inline-block; font-size: 0.9rem;}
        .q-item { display: flex; align-items: center; justify-content: space-between; background: white; padding: 10px; margin-bottom: 5px; border-radius: 8px; border: 1px solid #eee; }
        .q-item img { width: 40px; height: 40px; object-fit: cover; border-radius: 5px; margin-right: 10px; }
        
        .class-item { display: flex; align-items: center; justify-content: space-between; background: white; padding: 10px; margin-bottom: 5px; border-radius: 8px; border: 1px solid #eee; }

        .calc-box { background: var(--accent); padding: 10px; border-radius: 10px; font-weight: bold; color: #333; text-align: center; margin-top: 5px;}
        
        .credit-footer {
            position: absolute;
            bottom: 15px;
            font-size: 1.2rem;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8), -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }

        #room-code-banner {
            background: var(--accent); 
            padding: 10px 40px; 
            border-radius: 40px; 
            border: 5px solid white; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); 
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div id="dynamic-bg"></div>
    <div id="status-indicator" title="Connection Status"></div>
    <div id="home-btn" onclick="goHome()" title="Go Home">🏠</div>
    <div id="leave-btn" class="top-btn" onclick="studentLogout()">🚪 LEAVE</div>
    <div id="top-student-name">Name</div>
    <div id="gear" onclick="promptPassword('dash')">⚙️</div>

    <div id="game-container">
        <div id="screen-start" class="screen active">
            <div class="title-container">
                <span class="bouncing-letter" style="color: #FF5252; animation-delay: 0.0s;">W</span>
                <span class="bouncing-letter" style="color: #FF9800; animation-delay: 0.1s;">O</span>
                <span class="bouncing-letter" style="color: #FFCA28; animation-delay: 0.2s;">R</span>
                <span class="bouncing-letter" style="color: #8BC34A; animation-delay: 0.3s;">D</span>
                <span style="width: 20px;"></span>
                <span class="bouncing-letter" style="color: #03A9F4; animation-delay: 0.4s;">R</span>
                <span class="bouncing-letter" style="color: #9C27B0; animation-delay: 0.5s;">A</span>
                <span class="bouncing-letter" style="color: #E91E63; animation-delay: 0.6s;">C</span>
                <span class="bouncing-letter" style="color: #FF5722; animation-delay: 0.7s;">E</span>
            </div>
            
            <p style="color: var(--secondary); background: rgba(255,255,255,0.9); padding: 10px 30px; border-radius: 30px; font-weight: bold;">A Quiz Tournament.</p>
            
            <div style="display:flex; flex-wrap:wrap; justify-content:center;">
                <button class="btn btn-green" onclick="promptPassword('host')">TEACHER (Smartboard)</button>
                <button class="btn btn-orange" onclick="setRolePlayer()">STUDENT (Device)</button>
            </div>
            
            <div class="credit-footer">Made by: Teacher Cris Saranza</div>
        </div>

        <div id="screen-room-entry" class="screen">
            <h2 style="color: var(--primary);">Enter Room Code</h2>
            <input type="text" id="room-code-input" class="large-input" placeholder="e.g. 1234" maxlength="4" inputmode="numeric" autocomplete="off" style="text-transform: uppercase;">
            <button class="btn btn-orange" onclick="verifyRoomCode()">NEXT</button>
        </div>

        <div id="screen-name-entry" class="screen">
            <h2 style="color: var(--secondary);">What is your name?</h2>
            <input type="text" id="student-name-input" class="large-input" placeholder="Type name..." maxlength="12" autocomplete="off">
            <button class="btn btn-green" onclick="joinLobby()">JOIN GAME</button>
        </div>

        <div id="screen-host-lobby" class="screen">
            <div style="display: flex; gap: 15px; margin-bottom: 10px; align-items: center; justify-content: center; background: rgba(255,255,255,0.9); padding: 10px 20px; border-radius: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
                <label style="font-weight: bold; color: var(--primary); font-size: 1.2rem;">Active Class:</label>
                <select id="lobby-class-select" class="dash-input" style="width: auto; margin: 0; padding: 5px 15px; font-size: 1.2rem; border-radius: 20px; font-weight: bold; background: white; border: 3px solid var(--secondary); outline: none; cursor: pointer;" onchange="updateLobbyClass()">
                    <option value="">-- Open Room (Any Name) --</option>
                </select>
            </div>

            <div id="room-code-banner">
                <h2 style="margin: 0; color: #333; text-shadow: none;">ROOM CODE: <span id="display-room-code" style="font-size: 1.5em; color: var(--primary); font-family: monospace;">----</span></h2>
            </div>
            
            <h1 id="lobby-count" style="color: black; -webkit-text-stroke: 3px white; text-shadow: 4px 4px 0px rgba(0,0,0,0.3); margin-top: 0;">Waiting for Students... (0)</h1>
            <div class="lobby-container">
                <div class="lobby-grid" id="lobby-display"></div>
            </div>
            <div style="display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;">
                <button class="btn btn-green" id="start-btn" onclick="startTournament()">START TOURNAMENT</button>
                <button class="btn btn-danger" onclick="clearLobby()">CLEAR LOBBY</button>
            </div>
        </div>

        <div id="screen-host-bracket" class="screen">
            <button id="abort-btn" class="top-btn" onclick="resetGame()" style="display:none; top: 15px; left: 75px; background: var(--danger); color: white;">ABORT</button>
            <button id="race-btn" class="top-btn" onclick="nextWord()" style="display:none; top: 15px; right: 75px; background: var(--secondary); color: white;">START QUESTION</button>

            <h1 id="round-label" style="color: var(--primary); background: rgba(255,255,255,0.8); padding: 5px 20px; border-radius:20px;">Tournament Bracket</h1>
            
            <h2 id="host-prompt-display" style="color: var(--text); background: rgba(255,255,255,0.95); padding: 10px 20px; border-radius: 15px; display: none;"></h2>
            <img id="host-image-display" src="" alt="Question Image" style="max-height: 20vh; border-radius: 20px; display: none; box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin-bottom: 10px;">
            <h2 id="host-word-blanks" style="color: var(--secondary); letter-spacing: 15px; margin-top: 0; font-size: clamp(3rem, 6vw, 6rem); text-shadow: 2px 2px white;"></h2>
            
            <div class="bracket-container" id="bracket-display"></div>
            <div style="margin-top: 20px; display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;">
                <button class="btn btn-green" id="advance-btn" onclick="advanceTournamentPhase()" style="display:none;">NEXT ROUND</button>
            </div>
        </div>

        <div id="screen-play" class="screen">
            <div class="game-header">
                <h2 id="game-word-prompt" style="color: var(--primary); background: rgba(255,255,255,0.9); padding: 5px 30px; border-radius: 30px; margin:0;">Look at the Smartboard!</h2>
            </div>
            <div id="word-slots"></div>
            <button id="backspace-btn" onclick="triggerBackspace()">⌫ BACKSPACE</button>
            <div id="letter-sea"></div>
        </div>

        <div id="screen-wait" class="screen">
            <h1 id="wait-status" style="color: var(--secondary); background: rgba(255,255,255,0.8); padding: 10
